openapi: 3.0.3
info:
  title: Gateway Service API
  version: 0.1.0
  description: >
    Service-local API contract for the runnable gateway skeleton. The stable
    frontend-facing gateway contract remains docs/services/gateway/api/public.openapi.yaml.
servers:
  - url: http://localhost:8080
tags:
  - name: operations
paths:
  /healthz:
    get:
      tags: [operations]
      summary: Liveness check
      operationId: getGatewayHealth
      responses:
        '200':
          description: Gateway process is alive.
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [operations]
      summary: Readiness check
      operationId: getGatewayReadiness
      responses:
        '200':
          description: >
            Gateway lightweight readiness passed. This checks the Gateway
            session cache dependency, Auth readiness, and owner service base URL
            configuration; it does not prove owner-service business workflows or
            external provider calls are available.
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/Error'
components:
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: object
          required:
            - status
            - service
          properties:
            status:
              type: string
              enum: [ok, ready]
            service:
              type: string
              example: gateway
            version:
              type: string
              example: 0.1.0
            environment:
              type: string
              example: local
        requestId:
          type: string
          example: req_123
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          enum:
            - validation_error
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - rate_limited
            - dependency_error
            - internal_error
            - not_implemented
            - unsupported_intent
            - unsupported_mode
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
